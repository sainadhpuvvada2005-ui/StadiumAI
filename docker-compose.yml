services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stadiumai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stadiumai"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build: ./backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/stadiumai
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - backend
volumes:
  postgres_data:
